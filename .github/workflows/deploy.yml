name: Deploy App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Authenticate to VPS using SSH with private key
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # Step 2: Build Docker images on the VPS
      - name: Build Docker images on VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
            cd ${{ secrets.PROJECT_PATH}}
            git pull origin main
            docker compose -f compose.yaml -f compose.production.yaml build
          EOF

      # Step 3: Deploy with Docker Compose (restart services with minimal downtime)
      - name: Deploy Docker Compose services
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
            cd ${{ secrets.PROJECT_PATH}}
            docker compose up -d
          EOF
